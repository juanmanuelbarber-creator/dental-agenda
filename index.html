<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentaAgenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#0F6E56"/>
          <path d="M9 8a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.5c0 .8-.5 1.5-1.2 1.8L17 12v8a1 1 0 0 1-2 0v-3h-2v3a1 1 0 0 1-2 0v-8l-.8-.7C9.5 11 9 10.3 9 9.5V8z" fill="white"/>
        </svg>
        <span class="logo-text">DentaAgenda</span>
      </div>
      <div class="dentista-info" id="dentista-info"></div>
    </div>

    <nav class="nav">
      <a href="#agenda"    class="nav-item" data-page="agenda">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Agenda
      </a>
      <a href="#pacientes" class="nav-item" data-page="pacientes">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Pacientes
      </a>
      <a href="#historial" class="nav-item" data-page="historial">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Historial
      </a>
      <a href="#whatsapp"  class="nav-item" data-page="whatsapp">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        WhatsApp
      </a>
      <a href="#admin"     class="nav-item" data-page="admin">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Administración
      </a>
    </nav>
  </aside>

  <main class="main">
    <div id="page"></div>
  </main>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <div class="toast-area" id="toast-area"></div>

  <script src="js/utils/config.js"></script>
  <script src="js/utils/api.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/modules/agenda.js"></script>
  <script src="js/modules/pacientes.js"></script>
  <script src="js/modules/historial.js"></script>
  <script src="js/modules/whatsapp.js"></script>
  <script src="js/modules/admin.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Mostrar nombre del dentista en sidebar
    document.getElementById('dentista-info').textContent = CONFIG.nombre_dentista
  </script>
</body>
</html>
